controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    hand_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

hand_position_controller:
  ros__parameters:
    joints:
      - Thumb
      - Index
      - Middle
      - Ring
      - Little
      - Rotate
      - _thumb_distal_j01
      - _index_distal_j01
      - _middle_distal_j01
      - _ring_distal_j01
      - _little_distal_j01

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    # Configurações para controle manual suave
    open_loop_control: true
    allow_partial_joints_goal: true
    interpolation_method: splines

    # Tolerâncias obrigatórias para o RQT habilitar os Sliders
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0