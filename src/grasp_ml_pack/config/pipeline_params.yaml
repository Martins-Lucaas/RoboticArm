# ============================================================
# pipeline_params.yaml — Célula de Manufatura Biomédica
# CR10 + COVVI Hand + Esteira
#
# Objetos:
#   frasco — frasco de medicamento (âmbar, r=42mm, h=90mm) → Palm Grip → Box 1
#   tubo   — tubo de ensaio        (azul,  r=12mm, h=120mm) → Claw Grip → Box 2
#   ampola — ampola farmacêutica   (verde, r=5mm,  h=75mm)  → Fingertip Grip → Box 3
# ============================================================

# ── Detector de objetos ──────────────────────────────────────
object_detector:
  ros__parameters:
    use_yolo: false              # true para robô físico com GPU
    yolo_model: "yolov8n.pt"
    confidence_threshold: 0.45
    publish_debug: true

# ── Controlador da esteira ────────────────────────────────────
conveyor_controller:
  ros__parameters:
    sim_only: true
    pick_x: 0.75
    pick_y: 0.00
    belt_surface_z: 0.806   # topo real da correia (para referência)
    spawn_z: 2.0             # altura de spawn; objeto cai até a correia por gravidade
    object_sequence: ['frasco', 'tubo', 'ampola']

# ── Executor de grasp ─────────────────────────────────────────
grasp_executor:
  ros__parameters:
    sim_only: true

    # Posição XY da pick station (mesma para todos os objetos)
    pick_x: 0.75
    pick_y: 0.00

    # Altura do TCP (hand_base_link = centro da palma COVVI) no momento do grasp.
    # world frame; belt_top = 0.806 m.
    #
    # Os dedos em configuração de grasp curlam para baixo (eixo Z da palma = [0,0,-1]
    # no frame world), chegando até ~70 mm abaixo da palma (finger_fk z_mcp):
    #   palm_grip  Thumb (1.10 rad, k_p=1.400) → 67 mm
    #   claw_grip  Thumb (0.90 rad, k_p=1.400) → 71 mm  ← máximo
    #   fingertip  Index (0.70 rad, k_p=1.516) → 69 mm
    #
    # A palma DEVE ficar acima do topo do objeto para que as pontas dos dedos
    # alcancem a altura correta de preensão (~50% da altura do objeto).
    # Fórmula: pick_z = belt_top + obj_height + clearance_acima_do_topo
    #
    # frasco (h=90mm):  0.806 + 0.090 + 0.020 = 0.916 → dedos a ~43-51% de h
    # teach_sequence.yaml ponto_1 (gravado em x=0.65) validou z≈0.862 na posição
    # anterior; a x=0.75 o ramo IK muda e z=0.916 é o único com cadeia sem colisão.
    pick_z_frasco: 0.916
    # tubo   (h=120mm): 0.806 + 0.120 + 0.020 = 0.946 → dedos a ~58% de h
    pick_z_tubo:   0.946
    # ampola (h=75mm):  0.806 + 0.075 + 0.032 = 0.913 → dedos a ~51% de h
    pick_z_ampola: 0.913

    # ── Posições das caixas de destino (world frame) ─────────────────────
    # box_z é a altura de referência do centro da caixa.
    # O soltar ocorre em approach_box_z = box_z + APPROACH_CLEAR ≈ 0.75 m world,
    # acima das paredes das caixas (~0.705 m world). O objeto cai livremente.
    # Box 1 — frasco → palm_grip   (vermelho)
    box1_x: -0.05
    box1_y:  0.65
    box1_z:  0.60

    # Box 2 — tubo → claw_grip     (verde)
    box2_x:  0.25
    box2_y:  0.65
    box2_z:  0.60

    # Box 3 — ampola → fingertip   (azul)
    box3_x:  0.55
    box3_y:  0.65
    box3_z:  0.60

# ── Pipeline / orquestrador ───────────────────────────────────
conveyor_pipeline:
  ros__parameters:
    autonomous: false
    loop_rate_hz: 5.0
    detect_timeout_s: 30.0
    grasp_timeout_s: 300.0
    total_cycles: 3
