object_detector:
  ros__parameters:
    use_yolo: false              # true para robô físico com GPU
    yolo_model: "yolov8n.pt"
    confidence_threshold: 0.45
    publish_debug: true

pose_estimator:
  ros__parameters:
    camera_frame: "camera_link"
    depth_scale: 1.0
    camera_pos_x: 0.10
    camera_pos_y: 0.0
    camera_pos_z: 1.70
    camera_pitch_rad: 1.05
    table_z_world: 0.75
    robot_base_z_world: 0.375

grasp_planner:
  ros__parameters:
    n_candidates: 5
    score_threshold: 0.45

grasp_executor:
  ros__parameters:
    simulation_mode: true

grasp_pipeline:
  ros__parameters:
    loop_rate_hz: 10.0
    max_attempts: 3
